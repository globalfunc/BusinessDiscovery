name: businessdiscovery

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: businessdiscovery-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      PHP_IDE_CONFIG: serverName=businessdiscovery
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - businessdiscovery

  queue:
    image: businessdiscovery-app
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=1
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - businessdiscovery

  scheduler:
    image: businessdiscovery-app
    restart: unless-stopped
    entrypoint: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - businessdiscovery

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - businessdiscovery

  pgsql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-businessdiscovery}
      POSTGRES_USER: ${DB_USERNAME:-businessdiscovery}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-businessdiscovery} -d ${DB_DATABASE:-businessdiscovery}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - businessdiscovery

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    networks:
      - businessdiscovery

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILHOG_PORT:-1025}:1025"
      - "${FORWARD_MAILHOG_DASHBOARD_PORT:-8025}:8025"
    networks:
      - businessdiscovery

networks:
  businessdiscovery:
    driver: bridge

volumes:
  pgsql-data:
  redis-data:
